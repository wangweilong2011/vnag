<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="monokai-sublime.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="history"></div>

    <script src="highlight.min.js"></script>
    <script src="markdown-it.min.js"></script>
    <script>
        window.onload = function() {
            const md = window.markdownit({
                html: true,
                linkify: true,
                typographer: true,
                highlight: function (str, lang) {
                    const langAttr = lang ? ` data-lang="${md.utils.escapeHtml(lang)}"` : '';
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return `<pre class="hljs"${langAttr}><code>` +
                                    hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                                    '</code></pre>';
                        } catch (__) {}
                    }
                    return `<pre class="hljs"${langAttr}><code>` + md.utils.escapeHtml(str) + '</code></pre>';
                }
            });

            // 流式输出复制按钮的节流定时器
            let copyButtonTimer = null;

            function getCurrentTime() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                return `${hours}:${minutes}`;
            }

            // 通用复制函数，带成功/失败反馈和 CSS 状态类
            function copyText(text, button, successText) {
                successText = successText || '已复制 ✓';
                if (!text) return;

                navigator.clipboard.writeText(text).then(() => {
                    const oldText = button.innerText;
                    button.innerText = successText;
                    button.classList.add('copied');
                    button.disabled = true;
                    setTimeout(() => {
                        button.innerText = oldText;
                        button.classList.remove('copied');
                        button.disabled = false;
                    }, 1500);
                }).catch(() => {
                    const oldText = button.innerText;
                    button.innerText = '复制失败';
                    button.classList.add('copy-error');
                    setTimeout(() => {
                        button.innerText = oldText;
                        button.classList.remove('copy-error');
                    }, 1500);
                });
            }

            window.appendUserMessage = function(content) {
                const history = document.getElementById("history");
                const messageDiv = document.createElement("div");
                messageDiv.className = "message user";

                messageDiv.innerHTML = `
                    <div class="message-header">
                        <div class="icon">🧐</div>
                        <div class="role">用户</div>
                        <div class="timestamp">${getCurrentTime()}</div>
                        <button class="copy-user-button" title="复制消息" aria-label="复制用户消息内容">📋</button>
                    </div>
                    <div class="message-content">${content}</div>
                `;

                // 添加用户消息复制按钮事件
                const copyBtn = messageDiv.querySelector('.copy-user-button');
                copyBtn.addEventListener('click', function() {
                    const contentDiv = messageDiv.querySelector('.message-content');
                    copyText(contentDiv.innerText, this, '已复制 ✓');
                });

                history.appendChild(messageDiv);
                scrollToBottom();
            }

            window.appendAssistantMessage = function(markdownContent, assistantName, thinkingContent, inputTokens, outputTokens) {
                const history = document.getElementById("history");
                const messageDiv = document.createElement("div");
                messageDiv.className = "message assistant";
                
                // 存储原始 markdown 内容用于复制
                messageDiv.dataset.rawContent = markdownContent;
                
                const htmlContent = md.render(markdownContent);
                const roleName = assistantName || 'Assistant';

                // 构建 thinking 部分的 HTML
                let thinkingHtml = '';
                if (thinkingContent && thinkingContent.trim()) {
                    const thinkingRendered = md.render(thinkingContent);
                    thinkingHtml = `
                        <div class="thinking-container">
                            <div class="thinking-header">
                                <span class="thinking-icon">💡</span>
                                <span class="thinking-label">思考过程</span>
                                <span class="thinking-toggle">▼</span>
                            </div>
                            <div class="thinking-content">${thinkingRendered}</div>
                        </div>
                    `;
                }

                // 构建 token usage 显示的 HTML
                let usageHtml = '';
                if (inputTokens > 0 || outputTokens > 0) {
                    usageHtml = `<span class="token-usage">In ${inputTokens.toLocaleString()} / Out ${outputTokens.toLocaleString()}</span>`;
                }

                messageDiv.innerHTML = `
                    <div class="message-header">
                        <div class="icon">🤖</div>
                        <div class="role">${roleName}</div>
                        <div class="timestamp">${getCurrentTime()}</div>
                    </div>
                    ${thinkingHtml}
                    <div class="message-content">${htmlContent}</div>
                    <div class="message-footer">
                        ${usageHtml}
                        <button class="copy-all-button" title="复制全文" aria-label="复制完整回复内容">📋 复制</button>
                    </div>
                `;

                // 添加全文复制按钮事件
                addCopyAllButtonEvent(messageDiv);

                // 添加折叠/展开功能（如果有 thinking）
                if (thinkingContent && thinkingContent.trim()) {
                    addThinkingToggle(messageDiv);
                }

                addCopyButtons(messageDiv);
                history.appendChild(messageDiv);
                scrollToBottom();
            }

            window.startAssistantMessage = function(msgId, assistantName) {
                const history = document.getElementById("history");
                const messageDiv = document.createElement("div");
                messageDiv.id = msgId;
                messageDiv.className = "message assistant";
                messageDiv.dataset.rawContent = '';  // 初始化为空

                const roleName = assistantName || 'Assistant';

                messageDiv.innerHTML = `
                    <div class="message-header">
                        <div class="icon">🤖</div>
                        <div class="role">${roleName}</div>
                        <div class="timestamp">${getCurrentTime()}</div>
                    </div>
                    <div class="thinking-container" style="display: none;">
                        <div class="thinking-header">
                            <span class="thinking-icon">💡</span>
                            <span class="thinking-label">思考过程</span>
                            <span class="thinking-toggle">▼</span>
                        </div>
                        <div class="thinking-content"></div>
                    </div>
                    <div class="message-content"></div>
                    <div class="message-footer">
                        <button class="copy-all-button" title="复制全文" aria-label="复制完整回复内容" disabled>📋 复制</button>
                    </div>
                `;

                // 添加全文复制按钮事件
                addCopyAllButtonEvent(messageDiv);

                // 添加折叠/展开功能
                addThinkingToggle(messageDiv);

                history.appendChild(messageDiv);
                scrollToBottom();
            }

            window.updateThinking = function(msgId, thinkingContent) {
                const messageDiv = document.getElementById(msgId);
                if (messageDiv) {
                    const thinkingContainer = messageDiv.querySelector('.thinking-container');
                    const thinkingContentDiv = messageDiv.querySelector('.thinking-content');

                    // 显示 thinking 容器
                    if (thinkingContent && thinkingContent.trim()) {
                        thinkingContainer.style.display = 'block';
                    }

                    const el = document.documentElement;
                    const isScrolledToBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 1;

                    // 渲染 thinking 内容（使用 markdown）
                    thinkingContentDiv.innerHTML = md.render(thinkingContent);

                    if (isScrolledToBottom) {
                        window.scrollTo(0, document.body.scrollHeight);
                    }
                }
            }

            window.updateAssistantMessage = function(msgId, markdownContent) {
                const messageDiv = document.getElementById(msgId);
                if (messageDiv) {
                    // 更新原始内容
                    messageDiv.dataset.rawContent = markdownContent;

                    const contentDiv = messageDiv.querySelector('.message-content');

                    const el = document.documentElement;
                    const isScrolledToBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 1;

                    contentDiv.innerHTML = md.render(markdownContent);

                    // 节流添加代码块复制按钮（每 500ms 最多执行一次）
                    if (!copyButtonTimer) {
                        copyButtonTimer = setTimeout(() => {
                            addCopyButtons(messageDiv);
                            copyButtonTimer = null;
                        }, 500);
                    }

                    if (isScrolledToBottom) {
                        window.scrollTo(0, document.body.scrollHeight);
                    }
                }
            }

            window.finishAssistantMessage = function(msgId, inputTokens, outputTokens) {
                const messageDiv = document.getElementById(msgId);
                if (messageDiv) {
                    // 清除节流定时器，确保最终状态完整
                    if (copyButtonTimer) {
                        clearTimeout(copyButtonTimer);
                        copyButtonTimer = null;
                    }

                    addCopyButtons(messageDiv);

                    // 启用全文复制按钮
                    const copyAllBtn = messageDiv.querySelector('.copy-all-button');
                    if (copyAllBtn) {
                        copyAllBtn.disabled = false;
                    }

                    // 添加 Token 使用量显示（分开显示 input/output）
                    if (inputTokens > 0 || outputTokens > 0) {
                        const footer = messageDiv.querySelector('.message-footer');
                        const usageSpan = document.createElement('span');
                        usageSpan.className = 'token-usage';
                        usageSpan.innerText = `In ${inputTokens.toLocaleString()} / Out ${outputTokens.toLocaleString()}`;
                        footer.insertBefore(usageSpan, footer.firstChild);
                    }
                }
            }

            // 常用语言的友好显示名称映射
            const langDisplayNames = {
                'csharp': 'C#', 'cs': 'C#',
                'cpp': 'C++', 'cc': 'C++',
                'c': 'C',
                'js': 'JavaScript', 'javascript': 'JavaScript',
                'ts': 'TypeScript', 'typescript': 'TypeScript',
                'py': 'Python', 'python': 'Python',
                'rb': 'Ruby', 'ruby': 'Ruby',
                'go': 'Go', 'java': 'Java',
                'kotlin': 'Kotlin', 'kt': 'Kotlin',
                'swift': 'Swift', 'rust': 'Rust',
                'php': 'PHP', 'sql': 'SQL',
                'html': 'HTML', 'css': 'CSS',
                'scss': 'SCSS', 'less': 'LESS',
                'json': 'JSON', 'xml': 'XML',
                'yaml': 'YAML', 'yml': 'YAML',
                'toml': 'TOML',
                'md': 'Markdown', 'markdown': 'Markdown',
                'bash': 'Bash', 'sh': 'Shell', 'shell': 'Shell',
                'powershell': 'PowerShell', 'ps1': 'PowerShell',
                'bat': 'Batch', 'cmd': 'Batch',
                'dockerfile': 'Dockerfile',
                'lua': 'Lua', 'r': 'R',
                'scala': 'Scala', 'dart': 'Dart',
                'objectivec': 'Objective-C', 'objc': 'Objective-C',
                'fsharp': 'F#', 'vb': 'VB.NET', 'vbnet': 'VB.NET',
                'graphql': 'GraphQL',
                'proto': 'Protobuf', 'protobuf': 'Protobuf',
            };

            function addCopyButtons(element) {
                const pres = element.querySelectorAll('pre');
                pres.forEach(pre => {
                    // 防重复：已有头部栏则跳过
                    if (pre.querySelector('.code-header')) return;

                    const code = pre.querySelector('code');
                    if (!code) return;

                    // 创建代码块头部栏
                    const header = document.createElement('div');
                    header.className = 'code-header';

                    // 语言标签（优先使用映射表，未匹配则保留原始值）
                    const lang = pre.dataset.lang;
                    const langLabel = document.createElement('span');
                    langLabel.className = 'code-lang';
                    langLabel.textContent = lang ? (langDisplayNames[lang.toLowerCase()] || lang) : '';
                    header.appendChild(langLabel);

                    // 复制按钮
                    const button = document.createElement('button');
                    button.className = 'copy-button';
                    button.type = 'button';
                    button.title = '复制代码';
                    button.setAttribute('aria-label', '复制代码到剪贴板');
                    button.innerText = '复制代码';

                    button.addEventListener('click', () => {
                        copyText(code.innerText, button, '已复制 ✓');
                    });

                    header.appendChild(button);
                    pre.insertBefore(header, pre.firstChild);
                });
            }

            function addCopyAllButtonEvent(messageDiv) {
                const copyAllBtn = messageDiv.querySelector('.copy-all-button');
                if (copyAllBtn) {
                    copyAllBtn.addEventListener('click', function() {
                        let rawContent = messageDiv.dataset.rawContent;
                        // 移除工具调用记录
                        rawContent = rawContent.replace(/\[执行工具: [^\]]+\]\s*/g, '');
                        // 清理多余的空行
                        rawContent = rawContent.replace(/\n{3,}/g, '\n\n').trim();
                        copyText(rawContent, this, '已复制 ✓');
                    });
                }
            }

            function addThinkingToggle(messageDiv) {
                const thinkingHeader = messageDiv.querySelector('.thinking-header');
                if (!thinkingHeader) return;
                thinkingHeader.addEventListener('click', function() {
                    const container = this.parentElement;
                    const content = container.querySelector('.thinking-content');
                    const toggle = container.querySelector('.thinking-toggle');
                    
                    if (container.classList.contains('collapsed')) {
                        container.classList.remove('collapsed');
                        content.style.display = 'block';
                        toggle.textContent = '▼';
                    } else {
                        container.classList.add('collapsed');
                        content.style.display = 'none';
                        toggle.textContent = '▶';
                    }
                });
            }

            function scrollToBottom() {
                window.scrollTo(0, document.body.scrollHeight);
            }
        };
    </script>
</body>
</html>
